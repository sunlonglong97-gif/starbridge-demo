function vibrate() { if (navigator.vibrate) navigator.vibrate(30); }
function speak(text, rate = 0.8) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = rate;
    speechSynthesis.speak(u);
  }
}

function SpeakPage({ jobId, onBack }) {
  const phrases = PHRASES[jobId] || { work: [], social: [] };

  const [activeTab, setActiveTab] = useState("work");

  const handleSpeak = (text) => {
    vibrate();
    setSpeaking(text);
    speak(text, 0.8);
    setTimeout(() => setSpeaking(null), 2000);

    if (customText.trim()) {

      setCustomText("");

    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: C.bg }}>

function QuickCardPage({ jobId, onBack }) {

                <span style={{ fontSize: 14 }}>💡</span>
                <p style={{ fontSize: 16, color: C.yellow, fontWeight: 800 }}>{current.tip}</p>
              </div>
            )}
          </div>
        </div>
        <div style={{ padding: "8px 20px 20px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, marginBottom: 12 }}>

  const tasks = SHIFT_TASKS[jobId] || [];

  const [idx, setIdx] = useState(0);
  const [playing, setPlaying] = useState(false);

  const current = allSteps[idx];

  useEffect(() => {
    if (playing && current) {
      speak(current.text);
      const timer = setTimeout(() => setPlaying(false), 3000);
      return () => clearTimeout(timer);

  const goNext = () => { vibrate(); if (idx < allSteps.length - 1) setIdx(idx + 1); };

  if (!current) return (

      <div style={{ padding: "8px 20px 20px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, marginBottom: 12 }}>
          <button onClick={goPrev} disabled={idx === 0} style={{ background: idx === 0 ? "#E0E0DA" : "#F0F0EE", border: "none", borderRadius: "50%", width: 56, height: 56, fontSize: 22, color: idx === 0 ? "#BBB" : C.text }}>⏮</button>
          <button onClick={replay} style={{ background: C.yellowL, border: `2px solid ${C.yellow}`, borderRadius: "50%", width: 68, height: 68, fontSize: 26, color: C.yellow }}>🔊</button>
          <button onClick={goNext} disabled={idx === allSteps.length - 1} style={{ background: idx === allSteps.length - 1 ? "#E0E0DA" : "#F0F0EE", border: "none", borderRadius: "50%", width: 56, height: 56, fontSize: 22, color: idx === allSteps.length - 1 ? "#BBB" : C.text }}>⏭</button>
        </div>
        <button onClick={() => { vibrate(); setIdx(0); }} style={{ background: "#F0F0EE", border: "none", borderRadius: 18, height: 48, fontSize: 15, fontWeight: 800, color: C.sub, width: "100%" }}>🔄 从头开始</button>
      </div>
    </div>
  );
}

// ── 创建任务弹窗 ──
function CreateTaskModal({ onClose }) {
  const [step, setStep] = useState(1);
  const [taskName, setTaskName] = useState("");
  const [taskJob, setTaskJob] = useState("bakery");
  const [steps, setSteps] = useState([{ text: "", tip: "" }]);
  const [selectedEmployees, setSelectedEmployees] = useState([]);
  const [sent, setSent] = useState(false);

  const addStep = () => setSteps([...steps, { text: "", tip: "" }]);
  const updateStep = (i, field, val) => {
    const newSteps = [...steps];
    newSteps[i][field] = val;
    setSteps(newSteps);
  };
  const toggleEmployee = (name) => {
    setSelectedEmployees(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
  };

  if (sent) return (
    <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", padding: 28, zIndex: 200 }}>
      <div style={{ background: "#fff", borderRadius: 28, padding: "32px 24px", width: "100%", textAlign: "center" }}>
        <span style={{ fontSize: 40, color: C.green, animation: "checkPop 0.4s ease-out", display: "inline-block" }}>✓</span>
        <h2 style={{ fontSize: 20, fontWeight: 900, color: C.text, marginTop: 14, marginBottom: 8 }}>已发送</h2>
        <button onClick={onClose} style={{ background: C.green, border: "none", borderRadius: 18, height: 52, fontSize: 16, fontWeight: 900, color: "#fff", width: "100%" }}>好的</button>
      </div>
    </div>
  );

  return (
    <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", flexDirection: "column", justifyContent: "flex-end", zIndex: 200 }}>
      <div style={{ background: "#fff", borderRadius: "28px 28px 0 0", padding: "20px 20px 28px", maxHeight: "90%", overflowY: "auto" }}>
        <div style={{ display: "flex", alignItems: "center", marginBottom: 16 }}>
          <h3 style={{ fontSize: 20, fontWeight: 900, color: C.text, flex: 1 }}>创建新任务</h3>
          <button onClick={onClose} style={{ background: "#EBEBEB", border: "none", borderRadius: "50%", width: 34, height: 34, fontSize: 16, color: "#555" }}>✕</button>
        </div>

        <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
          {[1, 2, 3].map(s => (
            <div key={s} style={{ flex: 1, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ background: step >= s ? C.orange : "#E0E0DA", color: step >= s ? "#fff" : "#999", width: 28, height: 28, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 900 }}>{s}</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: step >= s ? C.orange : "#999" }}>{s === 1 ? "基本信息" : s === 2 ? "编辑步骤" : "发送"}</span>
            </div>
          ))}
        </div>

        {step === 1 && (
          <div>
            <label style={{ fontSize: 14, fontWeight: 800, color: C.text, display: "block", marginBottom: 6 }}>任务名称</label>
            <input value={taskName} onChange={e => setTaskName(e.target.value)} placeholder="例如：做咖啡" style={{ width: "100%", border: "2px solid #E0E0E0", borderRadius: 14, padding: "12px 14px", fontSize: 16, fontWeight: 700, marginBottom: 14, outline: "none" }} />
            <label style={{ fontSize: 14, fontWeight: 800, color: C.text, display: "block", marginBottom: 6 }}>所属岗位</label>
            <select value={taskJob} onChange={e => setTaskJob(e.target.value)} style={{ width: "100%", border: "2px solid #E0E0E0", borderRadius: 14, padding: "12px 14px", fontSize: 16, fontWeight: 700, marginBottom: 14, outline: "none", background: "#fff" }}>
              {JOBS.map(j => <option key={j.id} value={j.id}>{j.icon} {j.name}</option>)}
            </select>
            <button onClick={() => setStep(2)} style={{ background: C.orange, border: "none", borderRadius: 18, height: 56, fontSize: 17, fontWeight: 900, color: "#fff", width: "100%" }}>下一步</button>
          </div>
        )}

        {step === 2 && (
          <div>
            {steps.map((s, i) => (
              <div key={i} style={{ background: "#F5F5F2", borderRadius: 14, padding: "12px 14px", marginBottom: 10 }}>
                <p style={{ fontSize: 13, fontWeight: 800, color: C.orange, marginBottom: 6 }}>步骤 {i + 1}</p>
                <input value={s.text} onChange={e => updateStep(i, "text", e.target.value)} placeholder="做什么？（例如：磨咖啡豆）" style={{ width: "100%", border: "2px solid #E0E0E0", borderRadius: 12, padding: "10px 12px", fontSize: 15, fontWeight: 700, marginBottom: 8, outline: "none" }} />
                <input value={s.tip} onChange={e => updateStep(i, "tip", e.target.value)} placeholder="小提示（例如：按一次就够）" style={{ width: "100%", border: "2px solid #E0E0E0", borderRadius: 12, padding: "10px 12px", fontSize: 15, fontWeight: 700, outline: "none" }} />
              </div>
            ))}
            <button onClick={addStep} style={{ background: C.orangeL, border: `2px solid ${C.orange}30`, borderRadius: 14, height: 48, fontSize: 15, fontWeight: 800, color: C.orange, width: "100%", marginBottom: 14 }}>＋ 添加步骤</button>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setStep(1)} style={{ flex: 1, background: "#F0F0EE", border: "none", borderRadius: 18, height: 56, fontSize: 17, fontWeight: 800, color: "#666" }}>上一步</button>
              <button onClick={() => setStep(3)} style={{ flex: 1, background: C.orange, border: "none", borderRadius: 18, height: 56, fontSize: 17, fontWeight: 900, color: "#fff" }}>下一步</button>
            </div>
          </div>
        )}

        {step === 3 && (
          <div>
            <p style={{ fontSize: 14, fontWeight: 800, color: C.text, marginBottom: 10 }}>选择发送给谁：</p>
            {["小明", "小红", "小刚"].map(name => (
              <button key={name} onClick={() => toggleEmployee(name)} style={{
                display: "flex", alignItems: "center", gap: 10, background: selectedEmployees.includes(name) ? C.greenL : "#F5F5F2",
                border: selectedEmployees.includes(name) ? `2px solid ${C.green}` : "2px solid transparent",
                borderRadius: 14, padding: "14px 16px", marginBottom: 8, width: "100%", textAlign: "left",
              }}>
                <span style={{ fontSize: 20 }}>{selectedEmployees.includes(name) ? "✅" : "⬜"}</span>
                <span style={{ fontSize: 16, fontWeight: 800, color: C.text }}>{name}</span>
              </button>
            ))}
            <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
              <button onClick={() => setStep(2)} style={{ flex: 1, background: "#F0F0EE", border: "none", borderRadius: 18, height: 56, fontSize: 17, fontWeight: 800, color: "#666" }}>上一步</button>
              <button onClick={() => { vibrate(); setSent(true); }} style={{ flex: 1, background: C.green, border: "none", borderRadius: 18, height: 56, fontSize: 17, fontWeight: 900, color: "#fff" }}>🎁 发送任务</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

                <p style={{ fontSize: 16, fontWeight: 900, color: C.text }}>查看详细报告</p>

              <span style={{ fontSize: 18, color: C.sub }}>›</span>

        )}

        {tab === "records" && (
          <div>
            <p style={{ fontSize: 14, fontWeight: 800, color: C.text, marginBottom: 10 }}>今日使用记录</p>
            {[
              { time: "10:23", action: "完成了「做咖啡」", type: "完成" },
              { time: "09:45", action: "使用了「帮我说话」", type: "沟通" },
              { time: "09:12", action: "发送了「我不舒服」", type: "求助" },
              { time: "08:30", action: "开始工作", type: "开始" },
            ].map((r, i) => (
              <div key={i} style={{ background: "#FFF", border: "1.5px solid #E0E0DA", borderRadius: 14, padding: "12px 14px", marginBottom: 8, display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 12, color: C.sub, fontWeight: 700, flexShrink: 0 }}>{r.time}</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: C.text, flex: 1 }}>{r.action}</span>
                <span style={{ fontSize: 11, fontWeight: 800, color: C.blue, background: C.blueL, padding: "2px 8px", borderRadius: 6 }}>{r.type}</span>
              </div>
            ))}
          </div>
        )}

        {tab === "settings" && (
          <div>
            {[
              { icon: "🔔", title: "接收通知", desc: "孩子求助时通知我", on: true, action: "toggle" },
              { icon: "📊", title: "每日报告", desc: "每天发送工作摘要", on: true, action: "toggle" },
              { icon: "📞", title: "紧急联系人", desc: "设置紧急联系电话", on: false, action: "navigate" },
            ].map((s, i) => (
              <button key={i} onClick={() => { if (s.action === "navigate") setShowEmergencyContact(true); }} style={{
                background: "#FFF", border: "1.5px solid #E0E0DA", borderRadius: 16,
                padding: "14px 16px", marginBottom: 10, display: "flex", alignItems: "center", gap: 12,
                width: "100%", textAlign: "left",
              }}>
                <span style={{ fontSize: 24 }}>{s.icon}</span>
                <div style={{ flex: 1 }}>
                  <p style={{ fontSize: 16, fontWeight: 900, color: C.text }}>{s.title}</p>
                  <p style={{ fontSize: 12, color: C.sub, fontWeight: 700 }}>{s.desc}</p>
                </div>
                <span style={{ fontSize: 20 }}>{s.action === "toggle" ? (s.on ? "✅" : "⬜") : "›"}</span>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── 紧急联系人页 ──
function EmergencyContactPage({ onBack }) {
  const [contacts, setContacts] = useState([
    { name: "王老师", phone: "138****1234", relation: "辅导员" },
    { name: "李医生", phone: "139****5678", relation: "医生" },
  ]);
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState("");
  const [newPhone, setNewPhone] = useState("");

  const addContact = () => {
    if (newName && newPhone) {
      setContacts([...contacts, { name: newName, phone: newPhone, relation: "其他" }]);
      setNewName("");
      setNewPhone("");
      setShowAdd(false);
    }
  };

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: C.bg }}>
      <Header title="紧急联系人" onBack={onBack} />
      <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
        {contacts.map((c, i) => (
          <div key={i} style={{ background: "#FFF", border: "1.5px solid #E0E0DA", borderRadius: 16, padding: "14px 16px", marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 16, fontWeight: 900, color: C.text }}>{c.name}</span>
              <span style={{ fontSize: 12, fontWeight: 800, color: C.sub, background: "#F0F0EE", padding: "2px 8px", borderRadius: 6 }}>{c.relation}</span>
            </div>
            <p style={{ fontSize: 14, color: C.sub, fontWeight: 700, marginTop: 4 }}>{c.phone}</p>
          </div>
        ))}

        {showAdd ? (
          <div style={{ background: "#F5F5F2", borderRadius: 16, padding: "14px", marginTop: 10 }}>
            <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="姓名" style={{ width: "100%", border: "2px solid #E0E0E0", borderRadius: 12, padding: "10px 12px", fontSize: 15, fontWeight: 700, marginBottom: 8, outline: "none" }} />
            <input value={newPhone} onChange={e => setNewPhone(e.target.value)} placeholder="电话" style={{ width: "100%", border: "2px solid #E0E0E0", borderRadius: 12, padding: "10px 12px", fontSize: 15, fontWeight: 700, marginBottom: 10, outline: "none" }} />
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => setShowAdd(false)} style={{ flex: 1, background: "#E0E0DA", border: "none", borderRadius: 12, height: 44, fontSize: 15, fontWeight: 800, color: "#666" }}>取消</button>
              <button onClick={addContact} style={{ flex: 1, background: C.green, border: "none", borderRadius: 12, height: 44, fontSize: 15, fontWeight: 900, color: "#fff" }}>添加</button>
            </div>
          </div>
        ) : (
          <button onClick={() => setShowAdd(true)} style={{
            background: C.blueL, border: `2px solid ${C.blue}30`, borderRadius: 16,
            height: 48, fontSize: 15, fontWeight: 800, color: C.blue, width: "100%", marginTop: 10,
          }}>＋ 添加联系人</button>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// ── APP ──
// ══════════════════════════════════════

function App() {
  const [screen, setScreen] = useState("login");
  const [userName, setUserName] = useState("");
  const [role, setRole] = useState("");
  const [jobId, setJobId] = useState("bakery");
  const [settings, setSettings] = useState({
    sound: true,
    vibrate: true,
    largeFont: false,
    darkMode: false,
  });

  const now = new Date();
  const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")}`;

  const handleLogin = (name, selectedRole) => {
    vibrate();
    setUserName(name);
    setRole(selectedRole);
    if (selectedRole === "worker") {
      setScreen("jobSelect");
    } else {
      setScreen("home");
    }
  };

  const handleJobSelect = (job) => {
    vibrate();
    setJobId(job);
    setScreen("home");
  };

  const switchRole = () => {
    const roles = ["worker", "employer", "parent"];
    const idx = roles.indexOf(role);
    const next = roles[(idx + 1) % roles.length];
    setRole(next);
    if (next === "worker") {
      setScreen("jobSelect");
    } else {
      setScreen("home");
    }
  };

  const toggleSetting = (key) => {
    setSettings(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const renderContent = () => {
    if (screen === "login") return <LoginPage onLogin={handleLogin} />;
    if (screen === "jobSelect") return <JobSelectPage onSelect={handleJobSelect} onBack={() => setScreen("login")} />;

    if (role === "worker") {
      if (screen === "home") return <WorkerHomePage userName={userName} jobId={jobId} settings={settings} onSpeak={() => setScreen("speak")} onEmergency={() => setScreen("emergency")} onMood={() => setScreen("mood")} onShare={() => setScreen("share")} onPlayer={() => setScreen("player")} onQuickCard={() => setScreen("quickCard")} onSettings={() => setScreen("settings")} onSwitchRole={switchRole} />;
      if (screen === "speak") return <SpeakPage jobId={jobId} settings={settings} onBack={() => setScreen("home")} />;
      if (screen === "emergency") return <EmergencyPage jobId={jobId} settings={settings} onBack={() => setScreen("home")} />;
      if (screen === "mood") return <MoodPage settings={settings} onBack={() => setScreen("home")} />;
      if (screen === "share") return <SharePage settings={settings} onBack={() => setScreen("home")} />;
      if (screen === "player") return <PlayerPage jobId={jobId} settings={settings} onBack={() => setScreen("home")} />;
      if (screen === "quickCard") return <QuickCardPage jobId={jobId} settings={settings} onBack={() => setScreen("home")} />;
      if (screen === "settings") return <SettingsPage settings={settings} onToggle={toggleSetting} onBack={() => setScreen("home")} />;
    }
    if (role === "employer") return <EmployerHomePage settings={settings} onSwitchRole={switchRole} />;
    if (role === "parent") return <ParentHomePage settings={settings} onSwitchRole={switchRole} />;

    return <LoginPage onLogin={handleLogin} />;
  };

  return (
    <div style={{ display: "flex", justifyContent: "center", alignItems: "center", minHeight: "100vh", background: "#C8C3BD", fontFamily: "'Nunito', sans-serif", padding: "24px 0" }}>
      <div style={{ width: 390, height: 844, background: C.bg, borderRadius: 52, overflow: "hidden", boxShadow: "0 48px 120px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.12)", display: "flex", flexDirection: "column" }}>
        <div style={{ height: 44, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 28px", position: "relative" }}>
          <span style={{ fontSize: 15, fontWeight: 900, color: C.text, zIndex: 1 }}>{timeStr}</span>
          <div style={{ width: 126, height: 34, background: "#1A1A1A", borderRadius: 20, position: "absolute", left: "50%", transform: "translateX(-50%)" }} />
          <span style={{ fontSize: 13, fontWeight: 700, color: C.text, zIndex: 1 }}>●●●</span>
        </div>
        <div style={{ flex: 1, overflow: "hidden", position: "relative" }}>
          {renderContent()}
        </div>
        <div style={{ height: 28, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ width: 134, height: 5, background: "#1A1A1A", borderRadius: 3, opacity: 0.18 }} /></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
